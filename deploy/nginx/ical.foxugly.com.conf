# ⚠️ MANAGED FILE — do NOT edit /etc/nginx/sites-available/ical.foxugly.com on the box.
# Source of truth = this file (committed). The deploy pipeline reinstalls this exact blob
# from origin/main on every deploy, validates with `nginx -t`, and reloads — any manual
# edit on the server is reverted on the next deploy. Change THIS file in the repo
# (deploy/nginx/ical.foxugly.com.conf), commit, and let the deploy apply it.
# TLS lines are managed by Certbot (wildcard *.foxugly.com); keep them in sync if renewed.

limit_req_zone $binary_remote_addr zone=ical_post:10m rate=10r/m;

server {
    server_name ical.foxugly.com;

    access_log /var/log/nginx/ical.access.log;
    error_log /var/log/nginx/ical.error.log;

    client_max_body_size 2M;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net data:; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    location /media/ {
        alias /var/www/django_websites/django-ical/media/;
        location ~ \.(php|phtml|py|pl|cgi|sh|exe)$ {
            deny all;
        }
    }

    # Health endpoint (UptimeRobot) — proxied to Django (checks DB). No access-log noise.
    location = /health/ {
        access_log off;
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = / {
        limit_req zone=ical_post burst=5 nodelay;
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/foxugly.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/foxugly.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = ical.foxugly.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name ical.foxugly.com;
    return 404; # managed by Certbot
}
