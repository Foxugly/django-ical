limit_req_zone $binary_remote_addr zone=ical_post:10m rate=10r/m;

server {
    listen 80;
    server_name ical.foxugly.com;

    access_log /var/log/nginx/ical.access.log;
    error_log /var/log/nginx/ical.error.log;

    client_max_body_size 2M;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://code.jquery.com https://cdnjs.cloudflare.com https://stackpath.bootstrapcdn.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net data:; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    location /media/ {
        alias /var/www/django_websites/django-ical/media/;
        location ~ \.(php|phtml|py|pl|cgi|sh|exe)$ {
            deny all;
        }
    }

    location = / {
        limit_req zone=ical_post burst=5 nodelay;
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
