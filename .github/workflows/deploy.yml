name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - master

permissions:
  id-token: write    # required for OIDC token minting
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production    # gates the OIDC sub claim AND enables approval rules
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: gh-actions-${{ github.run_id }}

      - name: Trigger deploy on EC2 via SSM
        id: ssm
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          # AWS-RunShellScript runs these as ROOT, in order:
          #   1. chown tree -> django:www-data (self-heals root-owned git objects
          #      left by manual ops, so the django git reset below can't fail on them).
          #   2. as django, umask 027: fetch + hard-reset to origin/master. The umask
          #      makes every file git recreates be 640/750 (group www-data), killing
          #      the per-deploy world-readable (644) permission drift at the source.
          #   3. as ROOT: install both systemd units straight from the COMMITTED git
          #      blob at origin/master — never from the django-writable working tree
          #      (closes the cp-unit -> root-RCE escalation).
          #   4. daemon-reload + enable/restart the env-fetch oneshot (repopulates
          #      /run/ical/.env from SSM before the app restarts).
          #   5. as ROOT: install the nginx site config from the COMMITTED git blob,
          #      validate with `nginx -t`, reload ONLY if valid, else restore the prior
          #      config and fail the deploy (the live config is never left broken).
          #   6. as django: ssm-deploy.sh (pip/migrate/collectstatic + restart app via
          #      the tight sudoers grant).
          #   7. FINAL idempotent normalization (root, after everything that writes the
          #      tree): chown then chmod -R g-w,o-rwx -> 750 dirs / 640 files, group
          #      www-data, no other-access, no group-write. g-w,o-rwx preserves +x.
          cat > /tmp/ssm-params.json <<'EOF'
          {
            "commands": [
              "chown -R django:www-data /var/www/django_websites/django-ical",
              "sudo -u django bash -c 'umask 027; cd /var/www/django_websites/django-ical && git fetch --quiet && git reset --hard --quiet origin/master'",
              "git -C /var/www/django_websites/django-ical -c safe.directory=/var/www/django_websites/django-ical show origin/master:deploy/django-ical-env-fetch.service > /etc/systemd/system/django-ical-env-fetch.service",
              "git -C /var/www/django_websites/django-ical -c safe.directory=/var/www/django_websites/django-ical show origin/master:deploy/django-ical.service > /etc/systemd/system/django-ical.service",
              "git -C /var/www/django_websites/django-ical -c safe.directory=/var/www/django_websites/django-ical show origin/master:deploy/fetch-env-from-ssm.sh > /usr/local/sbin/django-ical-env-fetch.sh && chmod 0755 /usr/local/sbin/django-ical-env-fetch.sh && chown root:root /usr/local/sbin/django-ical-env-fetch.sh",
              "systemctl daemon-reload",
              "systemctl enable --quiet django-ical-env-fetch.service",
              "systemctl restart django-ical-env-fetch.service",
              "bash -c 'set -e; git -C /var/www/django_websites/django-ical -c safe.directory=/var/www/django_websites/django-ical show origin/master:deploy/nginx/ical.foxugly.com.conf > /etc/nginx/sites-available/ical.foxugly.com.new; cp -a /etc/nginx/sites-available/ical.foxugly.com /etc/nginx/sites-available/ical.foxugly.com.deploybak; mv /etc/nginx/sites-available/ical.foxugly.com.new /etc/nginx/sites-available/ical.foxugly.com; nginx -t || { mv /etc/nginx/sites-available/ical.foxugly.com.deploybak /etc/nginx/sites-available/ical.foxugly.com; exit 1; }; systemctl reload nginx'",
              "sudo -u django bash /var/www/django_websites/django-ical/deploy/ssm-deploy.sh",
              "chown -R django:www-data /var/www/django_websites/django-ical && chmod -R g-w,o-rwx /var/www/django_websites/django-ical"
            ],
            "executionTimeout": ["900"]
          }
          EOF
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy django-ical ${{ github.sha }}" \
            --cloud-watch-output-config CloudWatchOutputEnabled=true \
            --parameters file:///tmp/ssm-params.json \
            --query Command.CommandId --output text)
          echo "Command ID: $CMD_ID"
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command to finish
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          CMD_ID: ${{ steps.ssm.outputs.cmd_id }}
        run: |
          for _ in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success)
                echo "::group::stdout"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
                echo "::endgroup::"
                exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "Deploy $STATUS"
                echo "::group::stdout"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
                echo "::endgroup::"
                echo "::group::stderr"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
                echo "::endgroup::"
                exit 1 ;;
              *) sleep 5 ;;
            esac
          done
          echo "Timed out waiting for SSM command after 15 minutes"
          exit 1
